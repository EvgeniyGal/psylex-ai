<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PsyLex Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#b3b5b8",
                        "on-primary-fixed": "#001847",
                        "tertiary-fixed-dim": "#e6c364",
                        "surface": "#001234",
                        "background": "#001234",
                        "on-surface": "#d9e2ff",
                        "primary-fixed": "#dae2ff",
                        "outline-variant": "#44464f",
                        "secondary": "#c4c7ca",
                        "primary-fixed-dim": "#b2c5fe",
                        "inverse-surface": "#d9e2ff",
                        "on-error": "#690005",
                        "surface-container-high": "#142951",
                        "error-container": "#93000a",
                        "inverse-primary": "#4a5d8f",
                        "on-error-container": "#ffdad6",
                        "surface-container-lowest": "#000d29",
                        "surface-container-low": "#021a42",
                        "primary": "#b2c5fe",
                        "on-primary": "#192e5d",
                        "on-secondary-fixed": "#191c1e",
                        "on-primary-fixed-variant": "#324575",
                        "on-secondary": "#2d3133",
                        "on-background": "#d9e2ff",
                        "tertiary": "#e6c364",
                        "on-tertiary-fixed": "#241a00",
                        "on-tertiary": "#3d2e00",
                        "error": "#ffb4ab",
                        "surface-container": "#071e46",
                        "inverse-on-surface": "#1b2f58",
                        "surface-variant": "#20345c",
                        "surface-tint": "#b2c5fe",
                        "on-tertiary-fixed-variant": "#584400",
                        "tertiary-container": "#c9a84c",
                        "on-surface-variant": "#c5c6d0",
                        "secondary-container": "#44474a",
                        "secondary-fixed-dim": "#c4c7ca",
                        "on-tertiary-container": "#503d00",
                        "primary-container": "#1a2f5e",
                        "on-secondary-fixed-variant": "#44474a",
                        "on-primary-container": "#8598cd",
                        "tertiary-fixed": "#ffe08f",
                        "surface-container-highest": "#20345c",
                        "surface-bright": "#253861",
                        "secondary-fixed": "#e0e3e6",
                        "outline": "#8f909a",
                        "surface-dim": "#001234"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "gutter": "24px",
                        "container-max": "1280px",
                        "stack-md": "24px",
                        "stack-lg": "48px",
                        "unit": "8px",
                        "margin-desktop": "64px",
                        "stack-sm": "12px"
                    },
                    "fontFamily": {
                        "display-lg-mobile": ["Plus Jakarta Sans"],
                        "body-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg-mobile": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-glow {
            background: radial-gradient(circle at center, rgba(38, 65, 116, 0.4) 0%, rgba(0, 18, 52, 0) 70%);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- TopNavBar (Linear/Transactional Page: Nav items hidden, only Brand & Trailing Action shown) -->
<header class="bg-surface dark:bg-surface font-body-md text-body-md shadow-sm fixed w-full top-0 z-50">
<div class="flex justify-between items-center px-margin-desktop w-full max-w-container-max mx-auto h-20 bg-surface-container-high border-b border-outline-variant/10">
<!-- Brand -->
<div class="font-headline-md text-headline-md font-bold text-tertiary tracking-tight">
                PsyLex
            </div>
<!-- Role Switcher (Trailing Actions) -->
<div class="flex items-center gap-2 bg-surface-variant p-1 rounded-lg">
<button aria-pressed="true" class="px-4 py-2 rounded-md bg-surface text-on-surface shadow-sm font-label-md text-label-md transition-colors">
                    Plaintiff
                </button>
<button aria-pressed="false" class="px-4 py-2 rounded-md text-on-surface-variant hover:text-on-surface hover:bg-surface/50 font-label-md text-label-md transition-colors">
                    Defendant
                </button>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center pt-20 px-margin-desktop relative">
<!-- Ambient Glow -->
<div class="absolute inset-0 bg-glow pointer-events-none z-0"></div>
<div class="max-w-2xl text-center z-10 space-y-stack-lg">
<div class="space-y-stack-md">
<!-- Icon Highlight -->
<div class="w-16 h-16 mx-auto bg-surface-container-highest rounded-2xl flex items-center justify-center shadow-lg border border-outline-variant/20 mb-6">
<span class="material-symbols-outlined text-tertiary text-3xl" style="font-variation-settings: 'FILL' 1;">
                        psychology
                    </span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface">
                    Welcome to the application
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xl mx-auto leading-relaxed">
                    This tool will help you assess your psychological state, identify your strengths, and prepare for the next steps in your case.
                </p>
</div>
<div class="pt-8">
<button class="bg-tertiary text-on-tertiary font-label-md text-label-md font-bold px-8 py-4 rounded-lg shadow-md hover:bg-tertiary-container transition-all transform hover:scale-105 active:scale-95 flex items-center gap-2 mx-auto">
                    Start Assessment
                    <span class="material-symbols-outlined text-sm">
                        arrow_forward
                    </span>
</button>
<p class="mt-4 font-body-sm text-body-sm text-outline flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xs">lock</span>
                    Your responses are strictly confidential
                </p>
</div>
</div>
</main>
<!-- Background Decoration -->
<div class="fixed bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-surface-container-highest/20 to-transparent pointer-events-none z-0"></div>
</body></html>
