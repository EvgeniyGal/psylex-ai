<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PsyLex - Testing Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#b3b5b8",
                        "on-primary-fixed": "#001847",
                        "tertiary-fixed-dim": "#e6c364",
                        "surface": "#001234",
                        "background": "#001234",
                        "on-surface": "#d9e2ff",
                        "primary-fixed": "#dae2ff",
                        "outline-variant": "#44464f",
                        "secondary": "#c4c7ca",
                        "primary-fixed-dim": "#b2c5fe",
                        "inverse-surface": "#d9e2ff",
                        "on-error": "#690005",
                        "surface-container-high": "#142951",
                        "error-container": "#93000a",
                        "inverse-primary": "#4a5d8f",
                        "on-error-container": "#ffdad6",
                        "surface-container-lowest": "#000d29",
                        "surface-container-low": "#021a42",
                        "primary": "#b2c5fe",
                        "on-primary": "#192e5d",
                        "on-secondary-fixed": "#191c1e",
                        "on-primary-fixed-variant": "#324575",
                        "on-secondary": "#2d3133",
                        "on-background": "#d9e2ff",
                        "tertiary": "#e6c364",
                        "on-tertiary-fixed": "#241a00",
                        "on-tertiary": "#3d2e00",
                        "error": "#ffb4ab",
                        "surface-container": "#071e46",
                        "inverse-on-surface": "#1b2f58",
                        "surface-variant": "#20345c",
                        "surface-tint": "#b2c5fe",
                        "on-tertiary-fixed-variant": "#584400",
                        "tertiary-container": "#c9a84c",
                        "on-surface-variant": "#c5c6d0",
                        "secondary-container": "#44474a",
                        "secondary-fixed-dim": "#c4c7ca",
                        "on-tertiary-container": "#503d00",
                        "primary-container": "#1a2f5e",
                        "on-secondary-fixed-variant": "#44474a",
                        "on-primary-container": "#8598cd",
                        "tertiary-fixed": "#ffe08f",
                        "surface-container-highest": "#20345c",
                        "surface-bright": "#253861",
                        "secondary-fixed": "#e0e3e6",
                        "outline": "#8f909a",
                        "surface-dim": "#001234"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "gutter": "24px",
                        "container-max": "1280px",
                        "stack-md": "24px",
                        "stack-lg": "48px",
                        "unit": "8px",
                        "margin-desktop": "64px",
                        "stack-sm": "12px"
                    },
                    "fontFamily": {
                        "display-lg-mobile": ["Plus Jakarta Sans"],
                        "body-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg-mobile": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .test-card {
            transition: all 0.3s ease;
        }
        .test-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .test-card-active {
            background-image: linear-gradient(180deg, rgba(230,195,100,0.05) 0%, transparent 100%);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md text-body-md">
<!-- TopNavBar -->
<header class="bg-surface dark:bg-surface text-primary dark:text-primary font-body-md text-body-md shadow-sm bg-surface-container-high border-b border-outline-variant/10 w-full top-0">
<div class="flex justify-between items-center px-margin-desktop w-full max-w-container-max mx-auto h-20">
<!-- Brand -->
<div class="font-headline-md text-headline-md font-bold text-tertiary">
                LexMediate
            </div>
<!-- Navigation Links -->
<nav class="hidden md:flex gap-gutter">
<a class="text-on-surface-variant font-medium hover:text-primary transition-colors duration-200 cursor-pointer transition-transform active:scale-95" href="#">Dashboard</a>
<a class="text-primary font-bold border-b-2 border-primary pb-1 cursor-pointer transition-transform active:scale-95" href="#">Case Files</a>
<a class="text-on-surface-variant font-medium hover:text-primary transition-colors duration-200 cursor-pointer transition-transform active:scale-95" href="#">Messages</a>
<a class="text-on-surface-variant font-medium hover:text-primary transition-colors duration-200 cursor-pointer transition-transform active:scale-95" href="#">Schedule</a>
</nav>
<!-- Trailing Actions -->
<div class="flex items-center gap-4">
<div class="hidden md:flex items-center gap-2 bg-surface-container px-4 py-2 rounded-lg border border-outline-variant/20">
<span class="text-on-surface-variant font-label-md text-label-md">Role:</span>
<span class="text-on-surface font-label-md text-label-md">Plaintiff</span>
<button class="ml-2 text-tertiary hover:text-primary transition-colors text-label-md font-label-md underline cursor-pointer">Switch Role</button>
</div>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-stack-lg max-w-container-max mx-auto w-full">
<div class="w-full max-w-2xl flex flex-col gap-stack-md">
<div class="text-center mb-4">
<h1 class="font-display-lg text-display-lg mb-2">Psychological Assessment</h1>
<p class="text-on-surface-variant font-body-lg text-body-lg">Complete the required modules below to proceed with your mediation profile.</p>
</div>
<!-- Test List -->
<div class="flex flex-col gap-stack-sm w-full">
<!-- Item 1 -->
<button class="test-card w-full flex items-center justify-between p-6 rounded-xl bg-[#2A3D66] border border-white/10 text-left focus:outline-none focus:ring-2 focus:ring-tertiary">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">psychology</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-1">What is my personality type</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Core assessment module</p>
</div>
</div>
<div class="flex items-center gap-2 px-3 py-1 rounded border border-tertiary text-tertiary bg-tertiary/10">
<span class="material-symbols-outlined text-sm">check_circle</span>
<span class="font-label-md text-label-md uppercase">Passed</span>
</div>
</button>
<!-- Item 2 -->
<button class="test-card test-card-active w-full flex items-center justify-between p-6 rounded-xl bg-[#2A3D66] border border-white/10 text-left focus:outline-none focus:ring-2 focus:ring-tertiary relative overflow-hidden">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-tertiary"></div>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined">mood_bad</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-1">Face to face with fear</h3>
<p class="font-body-sm text-body-sm text-primary">Pending completion</p>
</div>
</div>
<div class="flex items-center gap-2 px-3 py-1 rounded border border-outline-variant text-on-surface-variant bg-surface-container-highest">
<span class="material-symbols-outlined text-sm">pending</span>
<span class="font-label-md text-label-md uppercase">Not passed</span>
</div>
</button>
<!-- Item 3 -->
<button class="test-card w-full flex items-center justify-between p-6 rounded-xl bg-[#2A3D66] border border-white/10 text-left focus:outline-none focus:ring-2 focus:ring-tertiary">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">analytics</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-1">Personality traits</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">In-depth analysis</p>
</div>
</div>
<div class="flex items-center gap-2 px-3 py-1 rounded border border-tertiary text-tertiary bg-tertiary/10">
<span class="material-symbols-outlined text-sm">check_circle</span>
<span class="font-label-md text-label-md uppercase">Passed</span>
</div>
</button>
<!-- Item 4 -->
<button class="test-card w-full flex items-center justify-between p-6 rounded-xl bg-[#2A3D66] border border-white/10 text-left focus:outline-none focus:ring-2 focus:ring-tertiary opacity-75">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-lowest flex items-center justify-center text-outline">
<span class="material-symbols-outlined">gavel</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-outline mb-1">Personality conflicts</h3>
<p class="font-body-sm text-body-sm text-outline">Locked until prerequisites met</p>
</div>
</div>
<div class="flex items-center gap-2 px-3 py-1 rounded border border-outline-variant text-outline bg-surface-container-lowest">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="font-label-md text-label-md uppercase">Not passed</span>
</div>
</button>
</div>
<!-- Hint & CTA -->
<div class="mt-stack-md flex flex-col items-center gap-stack-sm w-full">
<div class="flex items-start gap-3 bg-surface-container p-4 rounded-lg border border-outline-variant/20 w-full">
<span class="material-symbols-outlined text-tertiary mt-1">info</span>
<p class="font-body-sm text-body-sm text-on-surface-variant">
<span class="font-semibold text-on-surface">Hint:</span> You must complete all the tests listed above to unlock further features and proceed.
                    </p>
</div>
<button class="w-full md:w-auto mt-4 px-8 py-4 bg-tertiary text-on-tertiary font-body-lg text-body-lg font-bold rounded-lg hover:bg-tertiary-fixed transition-colors focus:outline-none focus:ring-4 focus:ring-tertiary/50 disabled:opacity-50 disabled:cursor-not-allowed">
                    Next Step
                </button>
</div>
</div>
</main>
</body></html>
